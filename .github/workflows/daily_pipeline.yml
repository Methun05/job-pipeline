name: Daily Job Pipeline

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST (UTC+5:30)
  # Manual trigger for testing — remove after confirmed working
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
          CRYPTORANK_API_KEY:   ${{ secrets.CRYPTORANK_API_KEY }}
        run: python -m pipeline.main

      - name: Notify on failure
        if: failure()
        run: |
          echo "Pipeline failed. Check Supabase pipeline_runs table for error details."
          echo "Last run errors will appear in the dashboard warning banner."
