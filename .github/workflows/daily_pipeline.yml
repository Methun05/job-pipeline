name: Daily Job Pipeline

on:
  # Triggered externally via cron-job.org at 02:30 UTC (8:00 AM IST)
  # GitHub's built-in schedule is unreliable (1-2hr delays) — external trigger is the fix
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:     ${{ secrets.GEMINI_API_KEY_2 }}
          APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
          HUNTER_API_KEY:       ${{ secrets.HUNTER_API_KEY }}
          EXA_API_KEY:          ${{ secrets.EXA_API_KEY }}
          EXA_API_KEY_2:        ${{ secrets.EXA_API_KEY_2 }}
          TAVILY_API_KEY:       ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY:        ${{ secrets.BRAVE_API_KEY }}
        run: python -m pipeline.main

      - name: Check for source issues and send alert
        # Runs even if pipeline step fails
        if: always()
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL:          ${{ secrets.ALERT_EMAIL }}
        run: python scripts/alert_on_source_issues.py
